services:
  - type: web
    name: speed-to-lead-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npx tsx src/index.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: speed-to-lead-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          name: speed-to-lead-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://speed-to-lead-api-7b08.onrender.com

  - type: redis
    name: speed-to-lead-redis
    plan: free

databases:
  - name: speed-to-lead-db
    plan: free
