services:
  - type: web
    name: speed-to-lead-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: speed-to-lead-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: speed-to-lead-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
  - type: redis
    name: speed-to-lead-redis
    ipAllowList: []
    plan: free

databases:
  - name: speed-to-lead-db
    plan: free
    
