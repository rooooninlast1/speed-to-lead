services:
  - type: web
    name: speed-to-lead-api
    dockerfilePath: Dockerfile
    dockerCommand: ""
    dockerContext: /
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: speed-to-lead-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: speed-to-lead-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: EMAIL_DOMAIN
        value: render.com
      - key: CLIENT_URL
        value: https://speed-to-lead-api-7b08.onrender.com
  - type: redis
    name: speed-to-lead-redis
    plan: free

databases:
  - name: speed-to-lead-db
    plan: free