version: "3.8"

services:
  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/speedtolead
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-me}
      - RESEND_API_KEY=${RESEND_API_KEY:-re_dummy}
      - EMAIL_DOMAIN=${EMAIL_DOMAIN:-localhost}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5173}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./public/widget:/app/public/widget

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: speedtolead
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d speedtolead"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
